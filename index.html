<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Wheel Spin</title>
<style>
  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --border: #e3e1d9;
    --border-strong: #cfccc0;
    --text: #1f1e1c;
    --text-secondary: #6b6a64;
    --accent: #1f1e1c;
    --radius-md: 8px;
    --radius-lg: 12px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    padding: 2rem 1rem 4rem;
  }
  .app {
    width: 100%;
    max-width: 920px;
    display: grid;
    grid-template-columns: 360px 1fr;
    gap: 2rem;
    align-items: start;
  }
  @media (max-width: 760px) {
    .app { grid-template-columns: 1fr; }
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0 0 1.5rem;
    text-align: center;
  }
  .wheel-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.25rem;
  }
  .wheel-wrap {
    position: relative;
    width: 320px;
    height: 320px;
  }
  #pointer {
    position: absolute;
    top: -2px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 13px solid transparent;
    border-right: 13px solid transparent;
    border-top: 22px solid var(--accent);
    z-index: 10;
    filter: drop-shadow(0 1px 1px rgba(0,0,0,0.15));
  }
  #wheel {
    width: 320px;
    height: 320px;
    transform: rotate(0deg);
    transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
    border-radius: 50%;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  .hub {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border-strong);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  button {
    font-family: inherit;
    font-size: 14px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--text);
    padding: 8px 14px;
    cursor: pointer;
    transition: background 0.15s, transform 0.05s;
  }
  button:hover { background: var(--bg); }
  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  #spin-btn {
    width: 180px;
    font-weight: 600;
    padding: 10px 14px;
    background: var(--accent);
    color: #fff;
    border: none;
  }
  #spin-btn:hover { background: #3a3935; }
  #result {
    min-height: 24px;
    font-size: 16px;
    font-weight: 600;
    text-align: center;
  }
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.1rem;
  }
  .panel + .panel { margin-top: 1rem; }
  .panel h2 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    color: var(--text-secondary);
    margin: 0 0 0.75rem;
  }
  .item-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg);
    border-radius: var(--radius-md);
    padding: 6px 10px;
    margin-bottom: 6px;
  }
  .swatch {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex: 0 0 auto;
  }
  .item-row .label {
    flex: 1;
    font-size: 14px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .item-row input[type="number"] {
    width: 64px;
    text-align: right;
    font-family: inherit;
    font-size: 13px;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 6px;
    background: var(--surface);
  }
  .pct-sign {
    font-size: 13px;
    color: var(--text-secondary);
    width: 12px;
  }
  .icon-btn {
    flex: 0 0 auto;
    width: 26px; height: 26px;
    padding: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
  }
  .add-row {
    display: flex;
    gap: 8px;
    margin-top: 0.5rem;
  }
  .add-row input[type="text"] {
    flex: 2;
    font-family: inherit;
    font-size: 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 8px 10px;
    background: var(--bg);
  }
  .add-row input[type="number"] {
    flex: 1;
    font-family: inherit;
    font-size: 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 8px 10px;
    background: var(--bg);
  }
  #total-warning {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 0.5rem;
  }
  .history-list {
    list-style: none;
    margin: 0;
    padding: 0;
    max-height: 200px;
    overflow-y: auto;
  }
  .history-list li {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }
  .history-list li:last-child { border-bottom: none; }
  .history-list .h-label { font-weight: 500; }
  .history-list .h-time { color: var(--text-secondary); }
  .empty-msg {
    font-size: 13px;
    color: var(--text-secondary);
    text-align: center;
    padding: 0.5rem 0;
  }
  .setup-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg);
    border-radius: var(--radius-md);
    padding: 6px 10px;
    margin-bottom: 6px;
  }
  .setup-row .label { flex: 1; font-size: 14px; }
  .setup-row button { font-size: 12px; padding: 5px 10px; }
  .save-row {
    display: flex;
    gap: 8px;
    margin-top: 0.5rem;
  }
  .save-row input[type="text"] {
    flex: 1;
    font-family: inherit;
    font-size: 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 8px 10px;
    background: var(--bg);
  }
  .top-actions {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 1rem;
  }
  .clear-link {
    font-size: 12px;
    color: var(--text-secondary);
    background: none;
    border: none;
    text-decoration: underline;
    cursor: pointer;
    padding: 0;
  }
</style>
</head>
<body>

<div class="app">
  <div class="wheel-col">
    <h1>Custom wheel spin</h1>
    <div class="wheel-wrap">
      <div id="pointer"></div>
      <svg id="wheel" viewBox="0 0 320 320">
        <g id="wheel-segments"></g>
        <circle cx="160" cy="160" r="158" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="1"></circle>
      </svg>
      <div class="hub">🎯</div>
    </div>
    <button id="spin-btn">▶ Spin the wheel</button>
    <div id="result"></div>

    <div class="panel" style="width: 100%; max-width: 320px;">
      <div style="display:flex; justify-content: space-between; align-items: center;">
        <h2 style="margin:0;">Spin history</h2>
        <button class="clear-link" id="clear-history">clear</button>
      </div>
      <ul class="history-list" id="history-list"></ul>
      <div class="empty-msg" id="history-empty">No spins yet</div>
    </div>
  </div>

  <div>
    <div class="panel">
      <h2>Items &amp; percentages</h2>
      <div id="item-list"></div>
      <div class="add-row">
        <input type="text" id="new-label" placeholder="Item name" />
        <input type="number" id="new-pct" placeholder="%" min="0" max="100" step="0.1" />
        <button id="add-btn">+</button>
      </div>
      <div id="total-warning"></div>
    </div>

    <div class="panel">
      <h2>Saved wheel setups</h2>
      <div id="setup-list"></div>
      <div class="empty-msg" id="setup-empty">No saved setups yet</div>
      <div class="save-row">
        <input type="text" id="setup-name" placeholder="Name this setup" />
        <button id="save-setup-btn">Save current</button>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  const STORAGE_KEY = 'wheelSpin.items';
  const HISTORY_KEY = 'wheelSpin.history';
  const SETUPS_KEY = 'wheelSpin.setups';

  const colorRamps = [
    ['#CECBF6', '#3C3489'],
    ['#9FE1CB', '#085041'],
    ['#F5C4B3', '#712B13'],
    ['#F4C0D1', '#72243E'],
    ['#85B7EB', '#0C447C'],
    ['#C0DD97', '#27500A'],
    ['#FAC775', '#633806'],
    ['#F7C1C1', '#791F1F'],
    ['#D3D1C7', '#444441']
  ];

  const defaultItems = [
    { label: 'Prize A', pct: 25 },
    { label: 'Prize B', pct: 25 },
    { label: 'Prize C', pct: 25 },
    { label: 'Prize D', pct: 25 }
  ];

  function loadJSON(key, fallback) {
    try {
      const raw = localStorage.getItem(key);
      if (!raw) return fallback;
      const parsed = JSON.parse(raw);
      return parsed;
    } catch (e) {
      return fallback;
    }
  }
  function saveJSON(key, value) {
    try {
      localStorage.setItem(key, JSON.stringify(value));
    } catch (e) {}
  }

  let items = loadJSON(STORAGE_KEY, defaultItems);
  let history = loadJSON(HISTORY_KEY, []);
  let setups = loadJSON(SETUPS_KEY, {});

  let currentRotation = 0;
  let spinning = false;

  const wheel = document.getElementById('wheel');
  const segGroup = document.getElementById('wheel-segments');
  const itemList = document.getElementById('item-list');
  const totalWarning = document.getElementById('total-warning');
  const resultEl = document.getElementById('result');
  const spinBtn = document.getElementById('spin-btn');
  const historyListEl = document.getElementById('history-list');
  const historyEmptyEl = document.getElementById('history-empty');
  const setupListEl = document.getElementById('setup-list');
  const setupEmptyEl = document.getElementById('setup-empty');

  function totalPct() {
    return items.reduce((s, i) => s + i.pct, 0);
  }

  function polarToCartesian(cx, cy, r, angleDeg) {
    const a = (angleDeg - 90) * Math.PI / 180;
    return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
  }

  function renderWheel() {
    segGroup.innerHTML = '';
    const total = totalPct();
    if (total <= 0 || items.length === 0) return;

    let startAngle = 0;
    const cx = 160, cy = 160, r = 158;

    items.forEach((item, idx) => {
      const sweep = (item.pct / total) * 360;
      const endAngle = startAngle + sweep;
      const large = sweep > 180 ? 1 : 0;
      const p1 = polarToCartesian(cx, cy, r, startAngle);
      const p2 = polarToCartesian(cx, cy, r, endAngle);
      const ramp = colorRamps[idx % colorRamps.length];

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      const d = `M ${cx} ${cy} L ${p1.x.toFixed(2)} ${p1.y.toFixed(2)} A ${r} ${r} 0 ${large} 1 ${p2.x.toFixed(2)} ${p2.y.toFixed(2)} Z`;
      path.setAttribute('d', d);
      path.setAttribute('fill', ramp[0]);
      path.setAttribute('stroke', '#ffffff');
      path.setAttribute('stroke-width', '1.5');
      segGroup.appendChild(path);

      if (sweep > 8) {
        const midAngle = startAngle + sweep / 2;
        const labelPos = polarToCartesian(cx, cy, r * 0.62, midAngle);
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', labelPos.x.toFixed(2));
        text.setAttribute('y', labelPos.y.toFixed(2));
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('dominant-baseline', 'middle');
        text.setAttribute('font-size', '12');
        text.setAttribute('font-weight', '600');
        text.setAttribute('fill', ramp[1]);
        text.setAttribute('transform', `rotate(${(midAngle).toFixed(2)} ${labelPos.x.toFixed(2)} ${labelPos.y.toFixed(2)})`);
        const labelText = item.label.length > 12 ? item.label.slice(0, 11) + '…' : item.label;
        text.textContent = labelText;
        segGroup.appendChild(text);
      }

      startAngle = endAngle;
    });
  }

  function renderList() {
    itemList.innerHTML = '';
    items.forEach((item, idx) => {
      const ramp = colorRamps[idx % colorRamps.length];
      const row = document.createElement('div');
      row.className = 'item-row';

      const swatch = document.createElement('div');
      swatch.className = 'swatch';
      swatch.style.background = ramp[0];
      row.appendChild(swatch);

      const label = document.createElement('span');
      label.textContent = item.label;
      label.className = 'label';
      row.appendChild(label);

      const pctInput = document.createElement('input');
      pctInput.type = 'number';
      pctInput.min = '0';
      pctInput.max = '100';
      pctInput.step = '0.1';
      pctInput.value = item.pct;
      pctInput.addEventListener('change', () => {
        const v = parseFloat(pctInput.value);
        item.pct = isNaN(v) || v < 0 ? 0 : v;
        pctInput.value = item.pct;
        persistItems();
        renderWheel();
        renderList();
      });
      row.appendChild(pctInput);

      const pctSign = document.createElement('span');
      pctSign.textContent = '%';
      pctSign.className = 'pct-sign';
      row.appendChild(pctSign);

      const delBtn = document.createElement('button');
      delBtn.textContent = '✕';
      delBtn.title = 'Remove ' + item.label;
      delBtn.className = 'icon-btn';
      delBtn.addEventListener('click', () => {
        items.splice(idx, 1);
        persistItems();
        renderWheel();
        renderList();
      });
      row.appendChild(delBtn);

      itemList.appendChild(row);
    });

    const total = totalPct();
    const rounded = Math.round(total * 10) / 10;
    if (items.length === 0) {
      totalWarning.textContent = 'Add at least one item to spin';
    } else if (Math.abs(total - 100) > 0.05) {
      totalWarning.textContent = `Total is ${rounded}% — odds are auto-normalized to 100% when spinning`;
    } else {
      totalWarning.textContent = `Total: ${rounded}%`;
    }
  }

  function persistItems() {
    saveJSON(STORAGE_KEY, items);
  }

  function renderHistory() {
    historyListEl.innerHTML = '';
    if (history.length === 0) {
      historyEmptyEl.style.display = 'block';
      return;
    }
    historyEmptyEl.style.display = 'none';
    history.slice().reverse().forEach(entry => {
      const li = document.createElement('li');
      const labelSpan = document.createElement('span');
      labelSpan.className = 'h-label';
      labelSpan.textContent = entry.label;
      const timeSpan = document.createElement('span');
      timeSpan.className = 'h-time';
      timeSpan.textContent = entry.time;
      li.appendChild(labelSpan);
      li.appendChild(timeSpan);
      historyListEl.appendChild(li);
    });
  }

  function addHistoryEntry(label) {
    const now = new Date();
    const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    history.push({ label, time });
    if (history.length > 50) history = history.slice(history.length - 50);
    saveJSON(HISTORY_KEY, history);
    renderHistory();
  }

  document.getElementById('clear-history').addEventListener('click', () => {
    history = [];
    saveJSON(HISTORY_KEY, history);
    renderHistory();
  });

  function renderSetups() {
    setupListEl.innerHTML = '';
    const names = Object.keys(setups);
    if (names.length === 0) {
      setupEmptyEl.style.display = 'block';
      return;
    }
    setupEmptyEl.style.display = 'none';
    names.forEach(name => {
      const row = document.createElement('div');
      row.className = 'setup-row';

      const label = document.createElement('span');
      label.className = 'label';
      label.textContent = name;
      row.appendChild(label);

      const loadBtn = document.createElement('button');
      loadBtn.textContent = 'Load';
      loadBtn.addEventListener('click', () => {
        items = JSON.parse(JSON.stringify(setups[name]));
        persistItems();
        renderWheel();
        renderList();
      });
      row.appendChild(loadBtn);

      const delBtn = document.createElement('button');
      delBtn.textContent = '✕';
      delBtn.title = 'Delete setup';
      delBtn.className = 'icon-btn';
      delBtn.addEventListener('click', () => {
        delete setups[name];
        saveJSON(SETUPS_KEY, setups);
        renderSetups();
      });
      row.appendChild(delBtn);

      setupListEl.appendChild(row);
    });
  }

  document.getElementById('save-setup-btn').addEventListener('click', () => {
    const nameInput = document.getElementById('setup-name');
    const name = nameInput.value.trim();
    if (!name) return;
    if (items.length === 0) return;
    setups[name] = JSON.parse(JSON.stringify(items));
    saveJSON(SETUPS_KEY, setups);
    nameInput.value = '';
    renderSetups();
  });
  document.getElementById('setup-name').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('save-setup-btn').click();
  });

  document.getElementById('add-btn').addEventListener('click', () => {
    const labelInput = document.getElementById('new-label');
    const pctInput = document.getElementById('new-pct');
    const label = labelInput.value.trim();
    let pct = parseFloat(pctInput.value);
    if (!label) return;
    if (isNaN(pct) || pct < 0) pct = 0;
    items.push({ label, pct });
    labelInput.value = '';
    pctInput.value = '';
    persistItems();
    renderWheel();
    renderList();
  });
  document.getElementById('new-label').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('add-btn').click();
  });
  document.getElementById('new-pct').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('add-btn').click();
  });

  spinBtn.addEventListener('click', () => {
    if (spinning) return;
    const total = totalPct();
    if (items.length === 0 || total <= 0) return;
    spinning = true;
    spinBtn.disabled = true;
    resultEl.textContent = '';

    let r = Math.random() * total;
    let cumulative = 0;
    let winnerIdx = 0;
    let startAngle = 0;
    let winnerStart = 0, winnerEnd = 0;

    for (let i = 0; i < items.length; i++) {
      const sweep = (items[i].pct / total) * 360;
      cumulative += items[i].pct;
      if (r <= cumulative) {
        winnerIdx = i;
        winnerStart = startAngle;
        winnerEnd = startAngle + sweep;
        break;
      }
      startAngle += sweep;
    }

    const winnerMid = (winnerStart + winnerEnd) / 2;
    const extraSpins = 5 + Math.floor(Math.random() * 3);
    const targetRotation = currentRotation - (currentRotation % 360) + extraSpins * 360 + (360 - winnerMid);

    currentRotation = targetRotation;
    wheel.style.transform = `rotate(${currentRotation}deg)`;

    setTimeout(() => {
      const winnerLabel = items[winnerIdx].label;
      resultEl.textContent = `Result: ${winnerLabel}`;
      addHistoryEntry(winnerLabel);
      spinning = false;
      spinBtn.disabled = false;
    }, 4100);
  });

  renderWheel();
  renderList();
  renderHistory();
  renderSetups();
})();
</script>

</body>
</html>
